<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardinal Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a232e; color: white; padding: 20px; font-size: 14px; }
        .card { background: #242f3d; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .debug { background: #000; color: #0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
        .success { color: #40b37e; font-weight: bold; }
        .error { color: #ff4f4f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Диагностика системы</h3>
        <div id="status">Проверка...</div>
    </div>

    <div class="card">
        <div>1. Данные из Hash (сырые):</div>
        <div id="hash-log" class="debug">Ожидание...</div>
    </div>

    <div class="card">
        <div>2. Объект User (распакованный):</div>
        <div id="user-log" class="debug">Ожидание...</div>
    </div>

    <button onclick="location.reload()" style="width: 100%; padding: 10px; background: #444; color: white; border: none; border-radius: 8px;">Обновить страницу</button>

    <<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function debug() {
        const hash = window.location.hash;
        const log = document.getElementById('hash-log');
        const userLog = document.getElementById('user-log');
        
        log.innerText = hash || "Hash ПУСТО";

        // Попробуем достать данные из initData (это строка)
        if (tg.initData) {
            userLog.innerText = "initData есть!\n" + tg.initData;
            
            // Если есть initData, значит данные точно внутри.
            // ТГ иногда не распаковывает их в initDataUnsafe сразу.
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                document.getElementById('status').innerHTML = "✅ ПОБЕДА! Юзер: " + tg.initDataUnsafe.user.first_name;
            }
        } else {
            userLog.innerText = "initData ПУСТО. ТГ не передал параметры.";
        }
    }

    setTimeout(debug, 500);
</script>
</body>
</html>
