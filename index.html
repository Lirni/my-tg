<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Era | Premium Glow</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.6);
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.2);
            --text: #ffffff;
            --hint: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            /* ТО САМОЕ СВЕЧЕНИЕ СВЕРХУ - УСИЛЕННОЕ */
            background-image: radial-gradient(circle at 50% -10%, rgba(212, 175, 55, 0.18) 0%, rgba(10, 10, 10, 0) 70%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            padding-bottom: 110px;
            min-height: 100vh;
        }

        /* Анимация перехода */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .brand-title { 
            text-align: center; color: var(--gold); 
            font-weight: 800; letter-spacing: 5px; 
            margin-bottom: 30px; font-size: 20px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        /* Карточки */
        .card-premium {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(15px); /* Эффект стекла */
            text-align: center;
        }

        .btn-gold {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); padding: 14px; border-radius: 14px;
            width: 100%; font-weight: 700; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-size: 13px;
        }

        /* Сетка товаров */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .item-card h3 { font-size: 14px; margin-bottom: 5px; }
        .item-card .price { color: var(--gold); font-weight: 800; }

        /* Поиск */
        .search-container { position: relative; margin-bottom: 25px; }
        .search-container input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #222;
            border-radius: 15px; padding: 12px 12px 12px 45px; color: white;
        }
        .search-container::before { content: '🔍'; position: absolute; left: 18px; top: 12px; opacity: 0.4; }

        /* Профиль */
        .avatar-wrap {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid var(--gold); margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: bold; overflow: hidden;
        }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

        /* Навигация */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding: 15px 10px 30px; border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
        }
        .nav-item { text-align: center; color: #444; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--gold); }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 5px; }
        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; display: block; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="brand-title">PRIME ERA</div>

    <!-- ГЛАВНАЯ -->
    <div id="home-page" class="page active">
        <div class="card-premium">
            <h2 style="color: var(--gold); margin-bottom: 15px;">Cardinal Extension v2.1</h2>
            <p style="font-size: 14px; color: var(--hint); margin-bottom: 25px;">Ультимативное решение для автоматизации ваших задач.</p>
            <button class="btn-gold" onclick="switchTab('catalog')">Перейти к покупке</button>
        </div>

        <p style="font-size: 12px; letter-spacing: 2px; color: white; margin-bottom: 15px; font-weight: bold;">СПЕЦПРЕДЛОЖЕНИЯ</p>
        <div class="grid">
            <div class="item-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><path d="M12 15l-2 5l-4-11l13 4l-5 2l7 7z"/></svg>
                <h3>VIP Статус</h3>
                <div class="price">990 ₽</div>
            </div>
            <div class="item-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.2"><path d="M3 18v-6a9 9 0 0118 0v6"/><path d="M21 19a2 2 0 01-2 2h-1a2 2 0 01-2-2v-3a2 2 0 012-2h3z"/></svg>
                <h3>Поддержка</h3>
                <div class="price">290 ₽</div>
            </div>
        </div>
    </div>

    <!-- КАТАЛОГ -->
    <div id="catalog-page" class="page">
        <div class="search-container">
            <input type="text" placeholder="Поиск по названию...">
        </div>
        <div class="grid">
            <div class="item-card">
                <h3>Cardinal Ext</h3>
                <div class="price">499 ₽</div>
            </div>
            <div class="item-card">
                <h3>Spam Bot</h3>
                <div class="price">750 ₽</div>
            </div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="profile-page" class="page">
        <div class="card-premium">
            <div id="u-avatar" class="avatar-wrap">?</div>
            <h2 id="u-name">Пользователь</h2>
            <p id="u-id" style="color: var(--hint); font-size: 13px;">ID: 00000000</p>
        </div>
    </div>

    <!-- ЧАТ (СЮДА ВКЛЕИВАЙ СВОЙ КОД) -->
    <div id="chat-page" class="page">
        <!-- Твой будущий код чата здесь -->
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="nav-bar">
        <div class="nav-item active" id="nav-home" onclick="switchTab('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" id="nav-catalog" onclick="switchTab('catalog')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Каталог</span>
        </div>
        <div class="nav-item" id="nav-profile" onclick="switchTab('profile')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>Профиль</span>
        </div>
        <div class="nav-item" id="nav-chat" onclick="switchTab('chat')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-10.6 8.5 8.5 0 013.1.6l5.7-2.3-2.3 5.7z"/></svg>
            <span>Чат</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function switchTab(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');

            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const activeNav = document.getElementById('nav-' + pageId);
            if (activeNav) activeNav.classList.add('active');
            
            tg.HapticFeedback.impactOccurred('light');
        }

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('u-name').innerText = user.first_name;
            document.getElementById('u-id').innerText = "ID: " + user.id;
            if (user.photo_url) {
                document.getElementById('u-avatar').innerHTML = `<img src="${user.photo_url}">`;
            } else {
                document.getElementById('u-avatar').innerText = user.first_name.charAt(0);
            }
        }
    </script>
</body>
</html>
