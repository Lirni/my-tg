<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Era - Cardinal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a232e; /* Цвет как на твоем скрине */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }
        .card {
            background-color: #242f3d;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #8aa1b1; margin-bottom: 20px; }
        .price { color: #40b37e; font-size: 28px; font-weight: bold; margin-bottom: 30px; }
        
        button {
            background-color: #2d8c6b; /* Зеленая кнопка как на скрине */
            color: white;
            border: none;
            padding: 15px 0;
            width: 100%;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }
        button:active { background-color: #247558; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Cardinal Extension</h1>
        <p>Версия 2.1 • Автоматизация</p>
        <div class="price">499 ₽</div>
        <button id="buyBtn">Купить расширение</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('buyBtn').addEventListener('click', function() {
            // Отправляем строку "buy_cardinal" боту
            tg.sendData("buy_cardinal");
        });
    </script>
</body>
</html>
