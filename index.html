<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardinal Prime Era | React Fixed</title>

    <!-- Библиотеки -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f9e29c;
            --border-gold: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: #0a0a0a;
            color: white;
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-image: radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.15), transparent 70%);
            background-attachment: fixed;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-gold);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }

        .gold-text {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

        /* Фикс для иконок lucide */
        .lucide { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, memo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Универсальный компонент иконки ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`lucide ${className}`}></i>;
        };

        // --- Навигация ---
        const BottomNav = ({ activeTab, setActiveTab }) => {
            const tabs = [
                { id: 'home', icon: 'home', label: 'Главная' },
                { id: 'catalog', icon: 'layout-grid', label: 'Каталог' },
                { id: 'profile', icon: 'user', label: 'Профиль' },
                { id: 'chat', icon: 'message-circle', label: 'Чат' },
            ];

            return (
                <nav className="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/90 backdrop-blur-md border-t border-[rgba(212,175,55,0.3)] py-3 px-6 flex justify-between items-center z-50">
                    {tabs.map((tab) => (
                        <button
                            key={tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            className={`flex flex-col items-center gap-1 transition-all duration-300 ${
                                activeTab === tab.id ? 'text-[#d4af37] scale-110' : 'text-gray-500'
                            }`}
                        >
                            <Icon name={tab.icon} size={20} className={activeTab === tab.id ? 'drop-shadow-[0_0_5px_rgba(212,175,55,0.5)]' : ''} />
                            <span className="text-[10px] uppercase tracking-wider font-medium">{tab.label}</span>
                        </button>
                    ))}
                </nav>
            );
        };

        const Header = ({ title }) => (
            <header className="pt-8 pb-4 px-6 flex justify-center items-center sticky top-0 bg-[#0a0a0a]/80 backdrop-blur-sm z-40">
                <h1 className="text-xl font-bold tracking-[0.2em] uppercase gold-text">{title}</h1>
            </header>
        );

        // --- Экраны ---

        const HomeScreen = () => (
            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }} className="px-6 pb-24 space-y-8">
                <div className="glass-card p-6 space-y-4 relative overflow-hidden">
                    <h2 className="text-2xl font-bold gold-text">Cardinal Extension v2.1</h2>
                    <p className="text-sm text-gray-400">Ультимативное решение для автоматизации ваших задач. Обновление уже доступно!</p>
                    <button className="w-full py-3 rounded-xl border border-[#d4af37]/50 bg-[#d4af37]/5 text-[#d4af37] font-bold text-sm">Перейти к покупке</button>
                </div>
                <div className="space-y-4">
                    <h3 className="text-lg font-bold tracking-wider uppercase text-gray-200">Спецпредложения</h3>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="glass-card p-6 flex flex-col items-center text-center gap-3">
                            <Icon name="crown" size={32} className="text-[#d4af37]" />
                            <div className="font-bold text-sm">VIP Статус</div>
                            <div className="text-[#d4af37] font-bold">990 ₽</div>
                        </div>
                        <div className="glass-card p-6 flex flex-col items-center text-center gap-3">
                            <Icon name="headphones" size={32} className="text-[#d4af37]" />
                            <div className="font-bold text-sm">Поддержка</div>
                            <div className="text-[#d4af37] font-bold">290 ₽</div>
                        </div>
                    </div>
                </div>
            </motion.div>
        );

        const CatalogScreen = () => {
            const [sel, setSel] = useState('Все');
            const [search, setSearch] = useState('');
            const items = [
                { id: 1, name: 'Cardinal Ext', cat: 'Плагины', price: 499, icon: 'shield' },
                { id: 2, name: 'Spam Bot', cat: 'Боты', price: 750, icon: 'mail' },
                { id: 3, name: 'Auto Script', cat: 'Скрипты', price: 300, icon: 'code', full: true },
                { id: 4, name: 'Telegram Bot', cat: 'Боты', price: 1200, icon: 'message-circle' },
            ];

            const filtered = items.filter(i => (sel === 'Все' || i.cat === sel) && i.name.toLowerCase().includes(search.toLowerCase()));

            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="px-6 pb-24 space-y-6">
                    <div className="relative">
                        <input type="text" placeholder="Поиск..." value={search} onChange={e => setSearch(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-sm outline-none focus:border-[#d4af37]/50" />
                    </div>
                    <div className="flex gap-2 overflow-x-auto no-scrollbar">
                        {['Все', 'Боты', 'Плагины', 'Скрипты'].map(c => (
                            <button key={c} onClick={() => setSel(c)} className={`px-4 py-2 rounded-full text-xs border ${sel === c ? 'bg-[#d4af37]/10 border-[#d4af37] text-[#d4af37]' : 'border-white/10 text-gray-400'}`}>{c}</button>
                        ))}
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {filtered.map(i => (
                            <div key={i.id} className={`glass-card p-4 flex flex-col items-center gap-3 ${i.full ? 'col-span-2' : ''}`}>
                                <Icon name={i.icon} size={28} className="text-[#d4af37]" />
                                <div className="font-bold text-sm">{i.name}</div>
                                <div className="text-[#d4af37] font-bold">{i.price} ₽</div>
                            </div>
                        ))}
                    </div>
                </motion.div>
            );
        };

        const ProfileScreen = ({ user }) => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="px-6 pb-24 space-y-8">
                <div className="flex flex-col items-center gap-4 py-4">
                    <div className="w-24 h-24 rounded-3xl overflow-hidden border-2 border-[#d4af37]/30 p-1">
                        <img src={user?.photo_url || "https://picsum.photos/seed/user/200"} className="w-full h-full object-cover rounded-2xl" />
                    </div>
                    <div className="text-center">
                        <div className="text-xl font-bold gold-text">{user?.first_name || "Кирюша"}</div>
                        <div className="text-xs text-gray-500 mt-1">ID: {user?.id || "674139959"}</div>
                    </div>
                </div>
                <div className="grid grid-cols-2 gap-4">
                    <div className="glass-card p-5"><div className="text-[10px] text-gray-500 uppercase font-bold">Покупки</div><div className="text-2xl font-bold">0</div></div>
                    <div className="glass-card p-5"><div className="text-[10px] text-gray-500 uppercase font-bold">Баланс</div><div className="text-2xl font-bold">0 ₽</div></div>
                </div>
            </motion.div>
        );

        const ChatScreen = () => (
            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="px-6 h-[60vh] flex flex-col items-center justify-center gap-6">
                <img src="https://img.freepik.com/free-vector/robot-with-headphones-listening-music_23-2148505537.jpg" className="w-40 h-40 object-contain drop-shadow-[0_0_15px_rgba(212,175,55,0.3)]" />
                <div className="glass-card p-4"><p className="text-sm font-medium">Чем могу помочь?</p></div>
            </motion.div>
        );

        // --- Main App ---
        function App() {
            const [tab, setTab] = useState('home');
            const [user, setUser] = useState(null);

            useEffect(() => {
                if (window.Telegram?.WebApp) {
                    const tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    setUser(tg.initDataUnsafe?.user);
                }
            }, []);

            return (
                <div className="min-h-screen">
                    <Header title={tab === 'home' ? 'Prime Era' : tab === 'catalog' ? 'Каталог' : tab === 'profile' ? 'Профиль' : 'Чат'} />
                    <main>
                        <AnimatePresence mode="wait">
                            {tab === 'home' && <HomeScreen key="h" />}
                            {tab === 'catalog' && <CatalogScreen key="cat" />}
                            {tab === 'profile' && <ProfileScreen key="p" user={user} />}
                            {tab === 'chat' && <ChatScreen key="ch" />}
                        </AnimatePresence>
                    </main>
                    <BottomNav activeTab={tab} setActiveTab={setTab} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
