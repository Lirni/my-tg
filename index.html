<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardinal Store</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color); /* Берем цвет темы телеграма */
            color: var(--tg-theme-text-color);
            text-align: center;
            padding: 20px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button {
            background-color: #248b6c; /* Вот тут мы можем задать ЗЕЛЕНЫЙ цвет! */
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Cardinal Extension</h2>
        <p>Версия 2.1 • Автоматизация</p>
        <h3 style="color: #248b6c;">499 ₽</h3>
    </div>

    <button id="buyBtn">Купить расширение</button>

    <script>
        // Инициализируем Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран
        
        document.getElementById('buyBtn').addEventListener('click', function() {
        let tg = window.Telegram.WebApp;
        tg.sendData("buy_cardinal_ext"); // Эта строка должна совпадать с тем, что в Python
        });
        
    </script>
</body>
</html>
