<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardinal Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a232e;
            --card-bg: #242f3d;
            --text-color: #ffffff;
            --hint-color: #8aa1b1;
            --accent-color: #40b37e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .user-name { color: var(--accent-color); font-weight: bold; }

        /* Стили карточек товаров */
        .item-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .item-info h3 { margin: 0 0 5px 0; font-size: 18px; }
        .item-info p { margin: 0; color: var(--hint-color); font-size: 13px; }
        
        .buy-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Секция профиля */
        .profile-section {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            display: none; /* Скрыт по умолчанию */
        }
        
        .nav {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 10px;
        }
        .nav-item { color: var(--hint-color); cursor: pointer; font-size: 14px; }
        .nav-item.active { color: var(--accent-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div id="welcome">Привет, <span class="user-name">Клиент</span>!</div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="btn-shop">🛒 Магазин</div>
        <div class="nav-item" id="btn-profile">👤 Профиль</div>
    </div>

    <!-- СЕКЦИЯ МАГАЗИНА -->
    <div id="shop-page">
        <div class="item-card">
            <div class="item-info">
                <h3>Cardinal Extension</h3>
                <p>v2.1 • Автоматизация</p>
                <div style="color: var(--accent-color); margin-top: 5px;">499 ₽</div>
            </div>
            <button class="buy-btn" onclick="buy('cardinal')">Купить</button>
        </div>

        <div class="item-card" style="opacity: 0.6;">
            <div class="item-info">
                <h3>Turbo Proxy</h3>
                <p>Скоро в продаже...</p>
            </div>
            <button class="buy-btn" style="background: #555;" disabled>Lock</button>
        </div>
    </div>

    <!-- СЕКЦИЯ ПРОФИЛЯ -->
    <div id="profile-page" class="profile-section">
        <div id="user-avatar" style="font-size: 50px; margin-bottom: 10px;">👤</div>
        <h3 id="profile-name">Имя Фамилия</h3>
        <p id="profile-id">ID: 00000000</p>
        <hr style="border: 0.5px solid #333; margin: 15px 0;">
        <p>Статус: <span style="color: var(--accent-color)">Активен</span></p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Отображаем имя пользователя из данных ТГ
        if (tg.initDataUnsafe.user) {
            document.querySelector('.user-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('profile-name').innerText = tg.initDataUnsafe.user.first_name + " " + (tg.initDataUnsafe.user.last_name || "");
            document.getElementById('profile-id').innerText = "ID: " + tg.initDataUnsafe.user.id;
        }

        // Переключение вкладок
        document.getElementById('btn-shop').onclick = function() {
            this.classList.add('active');
            document.getElementById('btn-profile').classList.remove('active');
            document.getElementById('shop-page').style.display = 'block';
            document.getElementById('profile-page').style.display = 'none';
        };

        document.getElementById('btn-profile').onclick = function() {
            this.classList.add('active');
            document.getElementById('btn-shop').classList.remove('active');
            document.getElementById('shop-page').style.display = 'none';
            document.getElementById('profile-page').style.display = 'block';
        };

        // Функция покупки
        function buy(item) {
            tg.sendData("buy_" + item);
        }
    </script>
</body>
</html>
