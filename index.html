<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardinal Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a232e; color: white; padding: 20px; font-size: 14px; }
        .card { background: #242f3d; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .debug { background: #000; color: #0f0; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
        .success { color: #40b37e; font-weight: bold; }
        .error { color: #ff4f4f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Диагностика системы</h3>
        <div id="status">Проверка...</div>
    </div>

    <div class="card">
        <div>1. Данные из Hash (сырые):</div>
        <div id="hash-log" class="debug">Ожидание...</div>
    </div>

    <div class="card">
        <div>2. Объект User (распакованный):</div>
        <div id="user-log" class="debug">Ожидание...</div>
    </div>

    <button onclick="location.reload()" style="width: 100%; padding: 10px; background: #444; color: white; border: none; border-radius: 8px;">Обновить страницу</button>

    <script>
        const tg = window.Telegram.WebApp;
        
        function runDiagnostics() {
            tg.ready();
            tg.expand();

            const hashBox = document.getElementById('hash-log');
            const userBox = document.getElementById('user-log');
            const statusBox = document.getElementById('status');

            // 1. Проверяем Hash (тут лежат данные до того, как скрипт ТГ их превратит в объект)
            const currentHash = window.location.hash;
            hashBox.innerText = currentHash || "ПУСТО (Данные не пришли в URL)";

            // 2. Проверяем готовый объект
            const userData = tg.initDataUnsafe?.user;
            if (userData) {
                userBox.innerText = JSON.stringify(userData, null, 2);
                statusBox.innerHTML = '<span class="success">✅ ДАННЫЕ ПОЛУЧЕНЫ!</span>';
            } else {
                userBox.innerText = "ОБЪЕКТ USER ПУСТ";
                statusBox.innerHTML = '<span class="error">❌ ДАННЫЕ НЕ НАЙДЕНЫ</span>';
            }
        }

        // Запуск через 300мс
        setTimeout(runDiagnostics, 300);
    </script>
</body>
</html>
