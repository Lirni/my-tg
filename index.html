<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardinal Debug</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a232e; color: white; padding: 20px; text-align: center; }
        .card { background: #242f3d; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .debug-box { 
            background: #000; color: #0f0; padding: 10px; border-radius: 10px; 
            text-align: left; font-family: monospace; font-size: 10px; 
            overflow-x: auto; white-space: pre-wrap; word-wrap: break-word;
        }
        button { background: #40b37e; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 10px;}
        h3 { margin-top: 0; }
        .status { color: #8aa1b1; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3 id="u-name">Загрузка...</h3>
        <div class="status" id="u-status">Ожидание данных от Telegram...</div>
        <button onclick="location.reload()">Обновить страницу</button>
    </div>

    <div class="card">
        <div style="font-size: 12px; color: #8aa1b1; margin-bottom: 5px;">DEBUG LOG:</div>
        <div id="debug-log" class="debug-box">Инициализация...</div>
    </div>

    <script>
        // Инициализация
        const tg = window.Telegram.WebApp;
        
        function initApp() {
            try {
                tg.ready();
                tg.expand();

                const logBox = document.getElementById('debug-log');
                const nameBox = document.getElementById('u-name');
                const statusBox = document.getElementById('u-status');

                // 1. Проверяем вообще наличие объекта Telegram
                if (!tg) {
                    logBox.innerText = "Ошибка: window.Telegram не найден!";
                    return;
                }

                // 2. Выводим всё, что есть в initDataUnsafe
                const fullData = JSON.stringify(tg.initDataUnsafe, null, 2);
                logBox.innerText = fullData;

                // 3. Пытаемся достать пользователя
                const user = tg.initDataUnsafe?.user;

                if (user) {
                    nameBox.innerText = "Привет, " + user.first_name + "!";
                    statusBox.innerText = "Данные успешно получены";
                    statusBox.style.color = "#40b37e";
                } else {
                    nameBox.innerText = "Данные не найдены";
                    statusBox.innerText = "Объект 'user' пуст. Попробуйте открыть через бота.";
                    statusBox.style.color = "#ff4f4f";
                }

            } catch (e) {
                document.getElementById('debug-log').innerText = "Критическая ошибка: " + e.message;
            }
        }

        // Запускаем с небольшой задержкой, чтобы ТГ успел прокинуть данные
        setTimeout(initApp, 500);
    </script>
</body>
</html>
