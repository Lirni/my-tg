<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cardinal Prime Era | Store</title>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f9e29c;
            --border-gold: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: #0a0a0a;
            color: white;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.15), transparent 70%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
            background-attachment: fixed;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .glass-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-gold);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .gold-text {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
        
        .lucide { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`lucide ${className}`}></i>;
        };

        // --- Детальная страница товара ---
        const ProductDetail = ({ item, onBack }) => {
            const handleBuy = () => {
                window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                window.Telegram.WebApp.sendData(`buy_id_${item.id}`);
            };

            return (
                <motion.div 
                    initial={{ opacity: 0, x: 50 }} 
                    animate={{ opacity: 1, x: 0 }} 
                    exit={{ opacity: 0, x: -50 }}
                    className="px-6 pb-32 space-y-6"
                >
                    <button onClick={onBack} className="flex items-center gap-2 text-gray-400 text-sm mb-4">
                        <Icon name="chevron-left" size={18} /> Назад в каталог
                    </button>

                    <div className="glass-card p-8 flex flex-col items-center text-center space-y-4">
                        <div className="p-5 rounded-3xl bg-[#d4af37]/10 text-[#d4af37] shadow-[0_0_20px_rgba(212,175,55,0.2)]">
                            <Icon name={item.icon} size={48} />
                        </div>
                        <h2 className="text-2xl font-bold gold-text">{item.name}</h2>
                        <div className="px-4 py-1 rounded-full border border-[#d4af37]/30 text-[#d4af37] text-[10px] uppercase font-bold tracking-widest">
                            {item.cat}
                        </div>
                        <div className="text-3xl font-extrabold text-white">{item.price} ₽</div>
                    </div>

                    <div className="space-y-4">
                        <h3 className="text-lg font-bold text-gray-200">Описание</h3>
                        <p className="text-sm text-gray-400 leading-relaxed">
                            {item.fullDesc}
                        </p>
                    </div>

                    <div className="space-y-4">
                        <h3 className="text-lg font-bold text-gray-200">Особенности</h3>
                        <div className="grid gap-3">
                            {item.features.map((f, i) => (
                                <div key={i} className="flex items-center gap-3 glass-card p-4 bg-white/5 border-white/5">
                                    <div className="text-[#d4af37]"><Icon name="check-circle" size={18} /></div>
                                    <span className="text-sm text-gray-300">{f}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    <button 
                        onClick={handleBuy}
                        className="w-full py-5 rounded-2xl bg-gradient-to-r from-[#d4af37] to-[#f9e29c] text-black font-black text-lg shadow-[0_10px_30px_rgba(212,175,55,0.3)] active:scale-95 transition-transform"
                    >
                        ПРИОБРЕСТИ
                    </button>
                </motion.div>
            );
        };

        // --- Экраны ---

        const HomeScreen = () => (
            <div className="px-6 pb-32 space-y-8">
                <div className="glass-card p-6 space-y-4 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-[#d4af37]/5 blur-3xl rounded-full -mr-16 -mt-16" />
                    <h2 className="text-2xl font-bold gold-text">Cardinal Extension v2.1</h2>
                    <p className="text-sm text-gray-400 leading-relaxed">Ультимативное решение для автоматизации ваших задач. Обновление уже доступно!</p>
                    <button className="w-full py-3 rounded-xl border border-[#d4af37]/50 bg-[#d4af37]/5 text-[#d4af37] font-bold text-sm">Перейти к покупке</button>
                </div>
                <div className="space-y-4">
                    <h3 className="text-lg font-bold tracking-wider uppercase text-gray-200">Спецпредложения</h3>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="glass-card p-6 flex flex-col items-center text-center gap-3">
                            <div className="p-3 rounded-full bg-[#d4af37]/10 text-[#d4af37]"><Icon name="crown" size={32} /></div>
                            <div className="font-bold text-sm text-white">VIP Статус</div>
                            <div className="text-[#d4af37] font-bold">990 ₽</div>
                        </div>
                        <div className="glass-card p-6 flex flex-col items-center text-center gap-3">
                            <div className="p-3 rounded-full bg-[#d4af37]/10 text-[#d4af37]"><Icon name="headphones" size={32} /></div>
                            <div className="font-bold text-sm text-white">Поддержка</div>
                            <div className="text-[#d4af37] font-bold">290 ₽</div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const CatalogScreen = () => {
            const [selectedItem, setSelectedItem] = useState(null);
            const [sel, setSel] = useState('Все товары');
            const [query, setQuery] = useState('');

            const items = [
                { 
                    id: 1, name: 'Cardinal Ext', cat: 'Плагины', price: 499, icon: 'shield',
                    fullDesc: 'Cardinal Extension - это профессиональный инструмент для автоматизации браузерных процессов. Позволяет значительно ускорить рутинные задачи и минимизировать ошибки.',
                    features: ['Автоматический обход капчи', 'Мгновенный парсинг данных', 'Поддержка приватных прокси', 'Смена Fingerprint']
                },
                { 
                    id: 2, name: 'Spam Bot', cat: 'Боты', price: 750, icon: 'mail',
                    fullDesc: 'Мощный бот для управления рассылками в Telegram. Включает в себя систему анти-бана и умные алгоритмы задержек.',
                    features: ['Массовая рассылка', 'Инвайтер в группы', 'Автоответчик', 'Сбор целевой аудитории']
                },
                { 
                    id: 3, name: 'Auto Script', cat: 'Скрипты', price: 300, icon: 'code', full: true,
                    fullDesc: 'Универсальный скрипт на базе Python для автоматизации кликов и ввода данных на любых веб-ресурсах.',
                    features: ['Настройка через конфиг', 'Многопоточность', 'Логирование действий']
                },
                { 
                    id: 4, name: 'Telegram Bot', cat: 'Боты', price: 1200, icon: 'message-circle',
                    fullDesc: 'Готовый шаблон магазина/визитки для вашего бизнеса в Telegram.',
                    features: ['Админ-панель', 'Интеграция оплат', 'Статистика пользователей']
                }
            ];

            const filtered = items.filter(i => (sel === 'Все товары' || i.cat === sel) && i.name.toLowerCase().includes(query.toLowerCase()));

            if (selectedItem) {
                return <ProductDetail item={selectedItem} onBack={() => setSelectedItem(null)} />;
            }

            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="px-6 pb-32 space-y-6">
                    <div className="relative">
                        <Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" />
                        <input type="text" placeholder="Поиск софта..." value={query} onChange={e => setQuery(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-sm outline-none focus:border-[#d4af37]/50" />
                    </div>
                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                        {['Все товары', 'Боты', 'Плагины', 'Скрипты'].map(c => (
                            <button key={c} onClick={() => setSel(c)} className={`px-4 py-2 rounded-full text-xs whitespace-nowrap border transition-all ${sel === c ? 'bg-[#d4af37]/10 border-[#d4af37] text-[#d4af37]' : 'border-white/10 text-gray-400'}`}>{c}</button>
                        ))}
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        {filtered.map(i => (
                            <div key={i.id} onClick={() => {
                                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
                                setSelectedItem(i);
                            }} className={`glass-card p-4 flex flex-col items-center gap-3 active:scale-95 transition-transform ${i.full ? 'col-span-2' : ''}`}>
                                <div className="p-3 rounded-xl bg-[#d4af37]/5 text-[#d4af37]"><Icon name={i.icon} size={28} /></div>
                                <div className="text-center"><div className="font-bold text-sm text-white">{i.name}</div><div className="text-[10px] text-gray-500">{i.cat}</div></div>
                                <div className="text-[#d4af37] font-bold">{i.price} ₽</div>
                            </div>
                        ))}
                    </div>
                </motion.div>
            );
        };

        const ProfileScreen = ({ user }) => (
            <div className="px-6 pb-32 space-y-8">
                <div className="flex flex-col items-center gap-4 py-4">
                    <div className="w-24 h-24 rounded-3xl overflow-hidden border-2 border-[#d4af37]/30 p-1 bg-[#0a0a0a]">
                        <img src={user?.photo_url || "https://picsum.photos/seed/user/200"} className="w-full h-full object-cover rounded-2xl" />
                    </div>
                    <div className="text-center">
                        <div className="text-xl font-bold gold-text">{user?.first_name || "Пользователь"}</div>
                        <div className="text-xs text-gray-500 mt-1">ID: {user?.id || "00000000"}</div>
                    </div>
                </div>
                <div className="grid grid-cols-2 gap-4">
                    <div className="glass-card p-5 text-center"><div className="text-[10px] text-gray-500 uppercase font-bold">Покупки</div><div className="text-2xl font-bold text-white">0</div></div>
                    <div className="glass-card p-5 text-center"><div className="text-[10px] text-gray-500 uppercase font-bold">Баланс</div><div className="text-2xl font-bold text-white">0 ₽</div></div>
                </div>
            </div>
        );

        const ChatScreen = () => (
            <div className="flex flex-col h-[70vh] px-6">
                <div className="flex-1 flex flex-col items-center justify-center gap-8">
                    <img src="https://img.freepik.com/free-vector/robot-with-headphones-listening-music_23-2148505537.jpg" className="w-48 h-48 object-contain drop-shadow-[0_0_20px_rgba(212,175,55,0.3)]" />
                    <div className="glass-card p-4"><p className="text-sm font-medium text-white">Чем могу помочь?</p></div>
                </div>
                <div className="flex items-center gap-2">
                    <input type="text" placeholder="Введите сообщение..." className="flex-1 bg-white/5 border border-white/10 rounded-xl py-4 px-6 text-sm outline-none" />
                    <button className="p-4 rounded-xl bg-[#d4af37]/10 border border-[#d4af37]/30 text-[#d4af37]"><Icon name="send" size={20} /></button>
                </div>
            </div>
        );

        // --- Main App ---
        function App() {
            const [tab, setTab] = useState('home');
            const [user, setUser] = useState(null);

            useEffect(() => {
                if (window.Telegram?.WebApp) {
                    const tg = window.Telegram.WebApp;
                    tg.ready(); tg.expand();
                    tg.setHeaderColor('#0a0a0a');
                    setUser(tg.initDataUnsafe?.user);
                }
            }, []);

            return (
                <div className="min-h-screen relative flex flex-col">
                    <header className="pt-8 pb-4 px-6 sticky top-0 bg-[#0a0a0a]/80 backdrop-blur-sm z-40 flex justify-center">
                        <h1 className="text-xl font-bold tracking-[0.2em] uppercase gold-text">Prime Era</h1>
                    </header>

                    <main className="flex-1 overflow-y-visible">
                        <AnimatePresence mode="wait">
                            <motion.div
                                key={tab}
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                exit={{ opacity: 0, y: -10 }}
                                transition={{ duration: 0.15 }}
                            >
                                {tab === 'home' && <HomeScreen />}
                                {tab === 'catalog' && <CatalogScreen />}
                                {tab === 'profile' && <ProfileScreen user={user} />}
                                {tab === 'chat' && <ChatScreen />}
                            </motion.div>
                        </AnimatePresence>
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/90 backdrop-blur-lg border-t border-[rgba(212,175,55,0.3)] py-3 px-6 flex justify-between items-center z-50">
                        {[
                            {id:'home', i:'home', l:'Главная'},
                            {id:'catalog', i:'layout-grid', l:'Каталог'},
                            {id:'profile', i:'user', l:'Профиль'},
                            {id:'chat', i:'message-circle', l:'Чат'}
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`flex flex-col items-center gap-1 transition-all ${tab === t.id ? 'text-[#d4af37] scale-110' : 'text-gray-500'}`}>
                                <Icon name={t.i} size={20} />
                                <span className="text-[10px] uppercase tracking-wider font-medium">{t.l}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
